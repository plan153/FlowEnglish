<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowEnglish</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --primary: #3b82f6; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0; padding: 0;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        .container { max-width: 850px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; color: #60a5fa; margin: 15px 0 10px; font-size: 2.1rem; }
        .level-bar { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 20px 0; }
        .level-btn {
            padding: 10px 18px;
            border-radius: 9999px;
            background: #1e2937;
            color: #94a3b8;
            cursor: pointer;
            font-weight: 600;
        }
        .level-btn.active { background: var(--primary); color: white; }
        .card {
            background: #1e2937;
            border-radius: 20px;
            padding: 28px;
            margin: 20px 0;
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.4);
        }
        #ko-sentence { font-size: 1.45rem; line-height: 1.5; min-height: 110px; margin: 20px 0; }
        #speech-result {
            width: 100%;
            padding: 16px;
            font-size: 1.2rem;
            border-radius: 12px;
            background: #334155;
            color: white;
            min-height: 80px;
            resize: none;
        }
        button {
            padding: 14px 20px;
            margin: 6px 4px;
            border: none;
            border-radius: 12px;
            font-size: 1.05rem;
            cursor: pointer;
        }
        .btn-speak { background: #22c55e; color: white; font-weight: bold; }
        .btn-speak:active { background: #16a34a; transform: scale(0.97); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-answer { background: #f59e0b; color: white; }
        .btn-shadow { background: #8b5cf6; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌊 FlowEnglish</h1>
        
        <!-- 오늘의 목표 -->
        <div style="text-align:center; margin:10px 0; font-size:1.1rem;">
            <span id="daily-goal">오늘의 목표: 0 / 10 문장</span>
        </div>

        <!-- 레벨 선택 -->
        <div class="level-bar">
            <div class="level-btn active" data-level="1" onclick="setLevel(1)">기초 다지기</div>
            <div class="level-btn" data-level="2" onclick="setLevel(2)">문장 키우기</div>
            <div class="level-btn" data-level="3" onclick="setLevel(3)">실전 흐름</div>
        </div>

        <div class="card">
            <div id="level-title" style="color:#94a3b8; font-size:1.15rem;">기초 다지기</div>
            <h2 id="ko-sentence">한국어 문장이 나오는 곳</h2>
            
            <textarea id="speech-result" rows="3" placeholder="말한 내용이 여기에 표시됩니다..."></textarea>

            <div style="text-align:center; margin:25px 0;">
                <button class="btn-speak" id="speakBtn"
                        onmousedown="startRecording()" 
                        onmouseup="stopRecording()"
                        ontouchstart="startRecording()"
                        ontouchend="stopRecording()">
                    🎤 말해보기 (누르고 말하세요)
                </button>
                <button class="btn-primary" onclick="speakEnglish()">🔊 영어듣기</button>
                <button class="btn-answer" onclick="showComparison()">📊 비교하기</button>
                <button class="btn-shadow" onclick="startShadowing()">🌊 따라하기</button>
            </div>

            <div id="feedback" style="min-height:130px; font-size:1.1rem; line-height:1.6;"></div>
        </div>

        <div style="text-align:center;">
            <button onclick="nextQuestion()" style="padding:16px 40px; font-size:1.15rem;">다음 문제 →</button>
        </div>
    </div>

    <script>
        let currentLevel = 1;
        let currentQuestion = null;
        let userSpokenText = "";
        let dailyCompleted = 0;
        const DAILY_GOAL = 10;

        const database = {
            1: [ // 기초 다지기
                { ko: "나는 매일 커피를 마신다.", en: "I drink coffee every day." },
                { ko: "그는 학교에 간다.", en: "He goes to school." },
                { ko: "나는 피곤하다.", en: "I am tired." },
                { ko: "그녀는 책을 읽는다.", en: "She reads a book." }
            ],
            2: [ // 문장 키우기
                { ko: "어제 영화를 봤다.", en: "I watched a movie yesterday." },
                { ko: "내일 뭐 할 거야?", en: "What will you do tomorrow?" },
                { ko: "그는 지금 공부하고 있니?", en: "Is he studying now?" }
            ],
            3: [ // 실전 흐름
                { ko: "오늘 아침에 커피를 마시고 산책했어요.", en: "I drank coffee and took a walk this morning." },
                { ko: "저는 서울에 살아요. 당신은 어디에 사세요?", en: "I live in Seoul. Where do you live?" }
            ]
        };

        function setLevel(level) {
            currentLevel = level;
            document.querySelectorAll('.level-btn').forEach(b => b.classList.toggle('active', parseInt(b.dataset.level) === level));
            document.getElementById('level-title').textContent = 
                level === 1 ? "기초 다지기" : level === 2 ? "문장 키우기" : "실전 흐름";
            nextQuestion();
        }

        function speakEnglish() {
            if (!currentQuestion) return;
            const u = new SpeechSynthesisUtterance(currentQuestion.en);
            u.lang = 'en-US';
            u.rate = currentLevel === 3 ? 0.85 : 0.95;
            speechSynthesis.speak(u);
        }

        let recognition = null;
        function startRecording() {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SR) return alert("음성 인식이 지원되지 않습니다.");
            
            recognition = new SR();
            recognition.lang = 'en-US';
            recognition.interimResults = true;
            recognition.continuous = true;

            recognition.onresult = (e) => {
                let transcript = "";
                for (let i = 0; i < e.results.length; i++) {
                    transcript += e.results[i][0].transcript + " ";
                }
                userSpokenText = transcript.trim();
                document.getElementById('speech-result').value = userSpokenText;
            };

            recognition.start();
        }

        function stopRecording() {
            if (recognition) {
                recognition.stop();
                if (userSpokenText) {
                    setTimeout(() => showComparison(), 300);
                }
            }
        }

        function showComparison() {
            if (!currentQuestion || !userSpokenText) {
                alert("먼저 말해보기 버튼을 눌러 말해주세요.");
                return;
            }

            dailyCompleted++;
            updateDailyGoal();

            const feedback = document.getElementById('feedback');
            const userWords = userSpokenText.toLowerCase().split(/\s+/);
            const correctWords = currentQuestion.en.toLowerCase().split(/\s+/);

            let html = `<strong>나의 말:</strong><br>`;
            userWords.forEach(word => {
                if (correctWords.includes(word)) {
                    html += `<span>${word} </span>`;
                } else {
                    html += `<span style="color:#ef4444; text-decoration:line-through;">${word} </span>`;
                }
            });

            html += `<br><br><strong>정답:</strong><br><span style="color:#22c55e; font-weight:bold;">${currentQuestion.en}</span>`;
            feedback.innerHTML = html;
        }

        function startShadowing() {
            if (!currentQuestion) return;
            const fb = document.getElementById('feedback');
            fb.innerHTML = `🌊 따라하기 시작!<br>3번 듣고 따라 말해보세요.`;
            let count = 0;
            const repeat = () => {
                if (count >= 3) return;
                speakEnglish();
                count++;
                setTimeout(repeat, 1700);
            };
            repeat();
        }

        function updateDailyGoal() {
            document.getElementById('daily-goal').textContent = 
                `오늘의 목표: ${dailyCompleted} / ${DAILY_GOAL} 문장`;
        }

        function nextQuestion() {
            currentQuestion = database[currentLevel][Math.floor(Math.random() * database[currentLevel].length)];
            document.getElementById('ko-sentence').textContent = currentQuestion.ko;
            document.getElementById('speech-result').value = '';
            document.getElementById('feedback').innerHTML = '';
            userSpokenText = "";
        }

        window.onload = () => {
            setLevel(1);
            updateDailyGoal();
            console.log('%cFlowEnglish 최신 버전 로드 완료!', 'color:#60a5fa; font-size:16px;');
        };
    </script>
</body>
</html>
