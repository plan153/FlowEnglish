<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowEnglish - Speaking Flow</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --primary: #3b82f6; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0; padding: 0;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        .container { max-width: 850px; margin: 0 auto; padding: 16px; }
        h1 { text-align: center; color: #60a5fa; margin: 20px 0; }
        .level-bar {
            display: flex; gap: 8px; margin: 20px 0; justify-content: center; flex-wrap: wrap;
        }
        .level-btn {
            padding: 10px 18px;
            border-radius: 9999px;
            background: #1e2937;
            color: #94a3b8;
            cursor: pointer;
            font-weight: 600;
        }
        .level-btn.active {
            background: var(--primary);
            color: white;
        }
        .card {
            background: #1e2937;
            border-radius: 20px;
            padding: 24px;
            margin: 20px 0;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
        }
        button {
            padding: 12px 20px;
            margin: 6px 4px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            cursor: pointer;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: #22c55e; color: white; }
        .btn-shadow { background: #8b5cf6; color: white; }
        #sentence { font-size: 1.35rem; line-height: 1.45; margin: 20px 0; min-height: 90px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌊 FlowEnglish</h1>

        <!-- 레벨 선택 -->
        <div class="level-bar">
            <div class="level-btn active" data-level="1" onclick="setLevel(1)">Level 1</div>
            <div class="level-btn" data-level="2" onclick="setLevel(2)">Level 2</div>
            <div class="level-btn" data-level="3" onclick="setLevel(3)">Level 3</div>
        </div>

        <div class="card">
            <div id="level-title" style="color:#94a3b8; font-size:1.1rem;">Level 1 • Basic Chunks</div>
            <h2 id="ko-sentence">한국어 문장이 나오는 곳</h2>
            
            <input type="text" id="user-input" placeholder="영어로 작성하세요..." 
                   style="width:100%; padding:14px; font-size:1.1rem; border-radius:12px; margin:15px 0;">

            <div style="text-align:center; margin:20px 0;">
                <button class="btn-primary" onclick="speakEnglish()">🔊 듣기</button>
                <button class="btn-success" onclick="checkAnswer()">✅ 제출</button>
                <button onclick="startListening()">🎤 말하기</button>
                <button class="btn-shadow" onclick="startShadowing()">🌊 Shadowing</button>
            </div>

            <div id="feedback" style="min-height:90px; font-size:1.1rem;"></div>
        </div>

        <div style="text-align:center;">
            <button onclick="nextQuestion()" style="padding:14px 32px; font-size:1.1rem;">다음 문장 →</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
