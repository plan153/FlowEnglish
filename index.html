<script>
// ==================== 개선된 문장 확장 로직 ====================
function makeVariation(type) {
    if (!currentQuestion) return;

    // 원본 문장을 기준으로 항상 새로 변환 (누적 오류 방지)
    let baseEn = currentQuestion.en;   // 원래 영어 문장
    let newEn = baseEn;
    let newKo = currentQuestion.ko;

    switch(type) {
        case 'negative':
            if (/^(I am|He is|She is|It is|We are|They are)/i.test(baseEn)) {
                newEn = baseEn.replace(/ am /i, ' am not ').replace(/ is /i, ' is not ').replace(/ are /i, ' are not ');
            } else {
                const subject = baseEn.split(' ')[0].toLowerCase();
                if (['he','she','it'].includes(subject)) {
                    newEn = subject + " does not " + baseEn.split(' ').slice(1).join(' ');
                } else {
                    newEn = subject + " do not " + baseEn.split(' ').slice(1).join(' ');
                }
            }
            newKo = newKo.replace(/한다$/, '하지 않는다.');
            break;

        case 'question':
            newEn = "Do " + baseEn.toLowerCase().replace(/^i /, '') + "?";
            newKo = newKo.replace(/한다\.$/, '합니까?');
            break;

        case 'neg-question':
            newEn = "Don't " + baseEn.toLowerCase().replace(/^i /, '') + "?";
            newKo = newKo.replace(/한다\.$/, '하지 않습니까?');
            break;

        case 'past':
            newEn = baseEn.replace(/drink/i, 'drank').replace(/go/i, 'went').replace(/watch/i, 'watched');
            newKo = newKo.replace(/한다$/, '했다.');
            break;

        case 'future':
            newEn = "I will " + baseEn.toLowerCase().replace(/^i /i, '');
            newKo = newKo.replace(/한다$/, '할 것이다.');
            break;
    }

    currentQuestion = { ...currentQuestion, ko: newKo, en: newEn };
    document.getElementById('ko-sentence').textContent = newKo;
    
    document.getElementById('feedback').innerHTML = 
        `<span style="color:#c084fc;">🔄 변환 완료 → <strong>${newEn}</strong></span>`;
}
</script>
