<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowEnglish - 28일 Speaking Flow</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --primary: #3b82f6; }
        body { font-family: system-ui, sans-serif; margin:0; background:#0f172a; color:#e2e8f0; }
        .container { max-width: 850px; margin: 0 auto; padding: 20px; }
        h1 { text-align:center; color:#60a5fa; font-size:2.3rem; margin:25px 0 8px; }
        
        .progress { text-align:center; font-size:1.1rem; margin:10px 0; color:#94a3b8; }
        .card { background:#1e2937; border-radius:20px; padding:24px; margin:18px 0; }
        .goal-card { border-left:6px solid #60a5fa; padding:18px; background:#172033; border-radius:12px; margin:15px 0; }
        
        button { padding:15px 25px; margin:8px 5px; border:none; border-radius:16px; font-size:1.1rem; cursor:pointer; }
        .btn-speak { background:#22c55e; color:white; font-weight:bold; }
        .btn-primary { background:var(--primary); color:white; }
        .btn-answer { background:#f59e0b; color:white; }
        .btn-shadow { background:#8b5cf6; color:white; }
    </style>
</head>
<body>
    <div class="container">

        <!-- 진행 상황 -->
        <div class="progress">
            <strong>Day <span id="current-day">1</span> / 28</strong> 
            <span id="week-info" style="margin-left:12px; color:#60a5fa;"></span>
        </div>

        <h1>🌊 FlowEnglish</h1>

        <!-- 레벨 선택 -->
        <div style="display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin:20px 0;">
            <div class="level-btn active" data-level="1" onclick="setLevel(1)">기초 다지기</div>
            <div class="level-btn" data-level="2" onclick="setLevel(2)">문장 키우기</div>
            <div class="level-btn" data-level="3" onclick="setLevel(3)">실전 흐름</div>
        </div>

        <!-- 오늘의 목표 -->
        <div class="goal-card" id="today-goal">
            <!-- JS로 동적으로 채움 -->
        </div>

        <div class="card">
            <div id="level-title">기초 다지기</div>
            <h2 id="ko-sentence">한국어 문장이 나오는 곳</h2>
            
            <textarea id="speech-result" rows="3" placeholder="말한 내용이 여기에 표시됩니다..."></textarea>

            <div style="text-align:center; margin:25px 0;">
                <button class="btn-speak" onmousedown="startRecording()" onmouseup="stopRecording()" ontouchstart="startRecording()" ontouchend="stopRecording()">
                    🎤 말해보기
                </button>
                <button class="btn-primary" onclick="speakEnglish()">🔊 영어듣기</button>
                <button class="btn-answer" onclick="showComparison()">📊 비교하기</button>
                <button class="btn-shadow" onclick="startShadowing()">🌊 따라하기</button>
            </div>

            <div id="feedback" style="min-height:140px; font-size:1.1rem;"></div>
        </div>

        <div style="text-align:center;">
            <button onclick="nextQuestion()" style="padding:16px 40px;">다음 문제 →</button>
        </div>
    </div>

    <script>
        let currentDay = 1;        // 오늘 날짜 (1~28)
        let currentLevel = 1;
        let currentQuestion = null;
        let userSpokenText = "";
        let dailyCompleted = 0;
        const DAILY_GOAL = 10;

        // ==================== 28일 학습 계획 ====================
        const dailyPlan = {
            1: { week: "Week 1", title: "기초 다지기", goal: "Be동사와 기본 어순(S+V) 완전 익히기", focus: "I am / You are / He is" },
            2: { week: "Week 1", title: "기초 다지기", goal: "I / You 중심 Chunk 마스터", focus: "I go, I like, I have" },
            3: { week: "Week 1", title: "기초 다지기", goal: "He / She 중심 Chunk 익히기", focus: "He goes, She reads" },
            4: { week: "Week 1", title: "기초 다지기", goal: "We / They + 일상 행동", focus: "We meet, They eat" },
            5: { week: "Week 1", title: "기초 다지기", goal: "부정문 연습", focus: "I don't, He isn't" },
            // ... (7~28일까지 계속)
            7: { week: "Week 1", title: "기초 다지기", goal: "Week 1 전체 복습", focus: "자유롭게 10문장 말하기" },
            8: { week: "Week 2", title: "기본 동사 확장", goal: "자주 쓰이는 동사 마스터", focus: "go, eat, drink, see, come" },
            14: { week: "Week 2", title: "기본 동사 확장", goal: "Week 2 종합 복습", focus: "모든 Chunk 섞어서 연습" },
            15: { week: "Week 3", title: "문장 키우기", goal: "과거 시제 마스터", focus: "I watched, I went" },
            21: { week: "Week 3", title: "문장 키우기", goal: "질문문 완전 정복", focus: "Do you ~? / What will you ~?" },
            22: { week: "Week 4", title: "실전 흐름", goal: "Shadowing + Listen & Respond", focus: "긴 문장 자연스럽게 말하기" },
            28: { week: "Week 4", title: "실전 흐름", goal: "28일 최종 복습", focus: "실전 대화 수준 도달" }
        };

        function updateDailyPlan() {
            const plan = dailyPlan[currentDay] || dailyPlan[1];
            document.getElementById('current-day').textContent = currentDay;
            document.getElementById('week-info').textContent = plan.week;

            document.getElementById('today-goal').innerHTML = `
                <strong>${plan.emoji || '🎯'} Day ${currentDay} 목표</strong><br>
                <span style="font-size:1.15rem;">${plan.goal}</span><br>
                <small style="color:#94a3b8;">오늘 집중: ${plan.focus}</small>
            `;
        }

        function setLevel(level) {
            currentLevel = level;
            document.querySelectorAll('.level-btn').forEach(btn => 
                btn.classList.toggle('active', parseInt(btn.dataset.level) === level)
            );
            nextQuestion();
        }

        // ==================== 기존 기능들 (간단 버전) ====================
        function speakEnglish() {
            if (!currentQuestion) return;
            const u = new SpeechSynthesisUtterance(currentQuestion.en);
            u.lang = 'en-US';
            u.rate = currentLevel === 3 ? 1.05 : 0.9;
            speechSynthesis.speak(u);
        }

        function startRecording() { /* 이전 최적화 코드 */ 
            // ... (이전 버전의 startRecording 함수 그대로 사용)
        }

        function stopRecording() {
            if (userSpokenText) setTimeout(showComparison, 300);
        }

        function showComparison() { /* 이전 비교 함수 */ }

        function startShadowing() { /* 이전 Shadowing */ }

        function nextQuestion() {
            // 간단 DB
            const sentences = [
                { ko: "나는 매일 커피를 마신다.", en: "I drink coffee every day." },
                { ko: "그는 학교에 간다.", en: "He goes to school." }
            ];
            currentQuestion = sentences[Math.floor(Math.random() * sentences.length)];
            document.getElementById('ko-sentence').textContent = currentQuestion.ko;
        }

        // 앱 시작
        window.onload = () => {
            updateDailyPlan();
            nextQuestion();
            console.log('%cFlowEnglish 28일 계획 버전 로드 완료', 'color:#60a5fa; font-size:16px;');
        };
    </script>
</body>
</html>
